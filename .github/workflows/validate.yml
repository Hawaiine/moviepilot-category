name: validate-category

on:
  push:
    paths:
      - 'config/category.yaml'
      - 'scripts/validate.sh'
      - 'scripts/validate.mjs'
  pull_request:
    paths:
      - 'config/category.yaml'
      - 'scripts/validate.sh'
      - 'scripts/validate.mjs'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: 安装 Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'

      - name: 安装 Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: 安装依赖
        run: |
          python3 -m pip install pyyaml --quiet
          corepack enable

      - name: 执行校验
        run: bash scripts/validate.sh config/category.yaml