name: validate-category

on:
  push:
    paths:
      - 'config/category.yaml'
      - 'scripts/validate.sh'
  pull_request:
    paths:
      - 'config/category.yaml'
      - 'scripts/validate.sh'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run validation
        run: bash scripts/validate.sh config/category.yaml
